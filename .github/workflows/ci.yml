name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev extra)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check packages tests

      - name: Pytest
        # Tests are designed to run WITHOUT a live Ollama daemon (LLM calls are not exercised).
        run: pytest

  android-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # No wrapper is checked in (avoids committing a binary jar) — Gradle is
      # provisioned directly by the step above instead of via ./gradlew.
      - name: Build polaris-study-kit + run its unit tests
        run: gradle :polaris-study-kit:build

      - name: Build the example app (debug APK)
        run: gradle :example:assembleDebug

  ios-build:
    runs-on: macos-latest
    # ios-native/ targets iOS/macOS 26 (Apple Foundation Models). GitHub's macos-latest
    # runner doesn't reliably ship that SDK yet, so this checks for it first and skips
    # cleanly (green, with a notice) instead of failing on every run until it's available.
    # continue-on-error stays on as a safety net in case the detection below is ever wrong.
    continue-on-error: true
    defaults:
      run:
        working-directory: ios-native

    steps:
      - uses: actions/checkout@v4

      - name: Check for an iOS/macOS 26 SDK
        id: sdkcheck
        run: |
          if xcodebuild -showsdks 2>/dev/null | grep -Eqi "(ios|macosx|xros) ?26"; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice::This runner's Xcode doesn't ship an iOS/macOS 26 SDK yet, so ios-native/ (Apple Foundation Models, iOS 26+) can't build here. Skipping — see ios-native/README.md. Re-runs will pick it up automatically once GitHub's runner image catches up."
          fi

      - name: swift build
        if: steps.sdkcheck.outputs.supported == 'true'
        run: swift build

      - name: swift test
        if: steps.sdkcheck.outputs.supported == 'true'
        run: swift test
